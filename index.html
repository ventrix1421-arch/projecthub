<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectHub Pro</title>
    <!-- Tailwind CSS for shadcn/ui styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(214.3 31.8% 91.4%)",
                        input: "hsl(214.3 31.8% 91.4%)",
                        ring: "hsl(215 20.2% 65.1%)",
                        background: "hsl(0 0% 100%)",
                        foreground: "hsl(222.2 84% 4.9%)",
                        primary: {
                            DEFAULT: "hsl(222.2 47.4% 11.2%)",
                            foreground: "hsl(210 40% 98%)",
                        },
                        secondary: {
                            DEFAULT: "hsl(210 40% 96.1%)",
                            foreground: "hsl(222.2 47.4% 11.2%)",
                        },
                        destructive: {
                            DEFAULT: "hsl(0 84.2% 60.2%)",
                            foreground: "hsl(210 40% 98%)",
                        },
                        muted: {
                            DEFAULT: "hsl(210 40% 96.1%)",
                            foreground: "hsl(222.2 47.4% 11.2%)",
                        },
                        accent: {
                            DEFAULT: "hsl(210 40% 96.1%)",
                            foreground: "hsl(222.2 47.4% 11.2%)",
                        },
                    },
                    borderRadius: {
                        lg: "0.5rem",
                        md: "calc(0.5rem - 2px)",
                        sm: "calc(0.5rem - 4px)",
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
        }
        ::placeholder {
            color: #111827 !important;
            opacity: 1 !important;
        }
        :-ms-input-placeholder {
            color: #111827 !important;
        }
        ::-ms-input-placeholder {
            color: #111827 !important;
        }
    </style>
</head>

<body class="text-foreground antialiased">
    <div class="grid grid-cols-1 lg:grid-cols-[360px_1fr] min-h-screen w-full">
        
        <!-- SIDEBAR: Fixed, Non-scrolling Left Control Panel -->
        <aside id="sidebar-container" class="bg-white border-b lg:border-b-0 lg:border-r border-border p-6 lg:sticky lg:top-0 lg:h-screen lg:overflow-hidden flex flex-col justify-between transition-colors duration-200">
            <div class="overflow-y-auto lg:overflow-visible space-y-5">
                <div>
                    <div class="flex items-center gap-2 mb-1">
                        <i data-lucide="layers" class="h-6 w-6 text-primary"></i>
                        <h1 class="text-xl font-bold tracking-tight text-gray-900">ProjectHub</h1>
                    </div>
                    <p class="text-sm font-medium text-gray-900 mt-1">Track and manage your development portfolio blueprints.</p>
                </div>

                <!-- Input Elements & Active Local Tracking Forms -->
                <div class="space-y-3.5">
                    <input type="hidden" id="edit-id" value="">
                    
                    <div>
                        <label class="text-sm font-semibold text-gray-900" for="t">Project Title *</label>
                        <input id="t" type="text" placeholder="e.g., Personal E-Commerce Application" oninput="saveDraft()" class="flex h-10 w-full rounded-md border-2 border-gray-300 bg-background px-3 py-2 text-sm font-medium text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary mt-1">
                    </div>

                    <div>
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-semibold text-gray-900" for="d">Description</label>
                            <!-- AUTO GENERATION ENGINE ACTION LINK -->
                            <button onclick="autoGenerateDescription()" class="text-xs font-bold text-blue-600 hover:text-blue-800 flex items-center gap-1 focus:outline-none" title="Generate layout description based on Title text input">
                                <i data-lucide="sparkles" class="w-3 h-3"></i> Auto-Generate
                            </button>
                        </div>
                        <textarea id="d" placeholder="Provide a snapshot or click 'Auto-Generate' to craft one depending on your project title..." rows="2" oninput="saveDraft()" class="flex min-h-[64px] w-full rounded-md border-2 border-gray-300 bg-background px-3 py-2 text-sm font-medium text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary mt-1"></textarea>
                    </div>

                    <div>
                        <label class="text-sm font-semibold text-gray-900" for="tech">Technologies</label>
                        <input id="tech" type="text" placeholder="e.g., React, Tailwind CSS, Supabase, Node.js" oninput="saveDraft()" class="flex h-10 w-full rounded-md border-2 border-gray-300 bg-background px-3 py-2 text-sm font-medium text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary mt-1">
                    </div>

                    <div>
                        <label class="text-sm font-semibold text-gray-900" for="s">Project Status</label>
                        <select id="s" onchange="saveDraft()" class="flex h-10 w-full rounded-md border-2 border-gray-300 bg-background px-3 py-2 text-sm font-semibold text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary mt-1">
                            <option value="Planned">Planned</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-sm font-semibold text-gray-900 flex items-center gap-1" for="git">GitHub URL <span class="text-[10px] text-gray-600 font-normal">(Optional)</span></label>
                            <input id="git" type="url" placeholder="https://github.com/user/repo" oninput="saveDraft()" class="flex h-10 w-full rounded-md border-2 border-gray-300 bg-background px-3 py-2 text-sm font-medium text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary mt-1">
                        </div>
                        <div>
                            <label class="text-sm font-semibold text-gray-900 flex items-center gap-1" for="demo">Demo URL <span class="text-[10px] text-gray-600 font-normal">(Optional)</span></label>
                            <input id="demo" type="url" placeholder="https://live-app.com" oninput="saveDraft()" class="flex h-10 w-full rounded-md border-2 border-gray-300 bg-background px-3 py-2 text-sm font-medium text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary mt-1">
                        </div>
                    </div>

                    <div>
                        <label class="text-sm font-semibold text-gray-900 flex items-center gap-1" for="host">Hosted Provider Link <span class="text-[10px] text-gray-600 font-normal">(Optional)</span></label>
                        <input id="host" type="url" placeholder="https://vercel.com/deployment-logs" oninput="saveDraft()" class="flex h-10 w-full rounded-md border-2 border-gray-300 bg-background px-3 py-2 text-sm font-medium text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary mt-1">
                    </div>
                </div>
            </div>

            <!-- Contextual State Form Button Logic -->
            <div class="pt-4 border-t border-border mt-4 lg:mt-0 bg-white">
                <button id="submit-btn" onclick="handleSubmit()" class="inline-flex items-center justify-center rounded-md text-sm font-bold transition-colors bg-gray-900 text-white hover:bg-gray-800 h-11 py-2 px-4 w-full shadow">
                    <i id="submit-icon" data-lucide="plus" class="mr-2 h-4 w-4"></i> <span id="submit-text">Add Project</span>
                </button>
                <button id="cancel-btn" onclick="clearForm()" class="hidden items-center justify-center rounded-md text-sm font-bold transition-colors border-2 border-gray-300 bg-background hover:bg-accent text-gray-900 h-10 px-3 w-full mt-2">
                    Cancel Editing
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT VIEWPORT: Smooth independent scroll layout -->
        <main class="p-6 lg:p-8 space-y-6 overflow-y-auto">
            
            <!-- Statistical Performance Metrics Header -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <div class="bg-white border border-border p-4 rounded-xl shadow-sm flex items-center justify-between">
                    <div>
                        <div class="text-xs font-bold text-gray-900 uppercase tracking-wider">Total</div>
                        <div id="stat-all" class="text-2xl font-black mt-0.5">0</div>
                    </div>
                    <div class="p-2 bg-slate-100 rounded-lg text-slate-900"><i data-lucide="briefcase" class="h-4 w-4"></i></div>
                </div>
                <div class="bg-white border border-border p-4 rounded-xl shadow-sm flex items-center justify-between">
                    <div>
                        <div class="text-xs font-bold text-gray-900 uppercase tracking-wider">Planned</div>
                        <div id="stat-planned" class="text-2xl font-black mt-0.5 text-amber-600">0</div>
                    </div>
                    <div class="p-2 bg-amber-50 rounded-lg text-amber-600"><i data-lucide="calendar" class="h-4 w-4"></i></div>
                </div>
                <div class="bg-white border border-border p-4 rounded-xl shadow-sm flex items-center justify-between">
                    <div>
                        <div class="text-xs font-bold text-gray-900 uppercase tracking-wider">In Progress</div>
                        <div id="stat-progress" class="text-2xl font-black mt-0.5 text-blue-600">0</div>
                    </div>
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-600"><i data-lucide="git-branch" class="h-4 w-4"></i></div>
                </div>
                <div class="bg-white border border-border p-4 rounded-xl shadow-sm flex items-center justify-between">
                    <div>
                        <div class="text-xs font-bold text-gray-900 uppercase tracking-wider">Completed</div>
                        <div id="stat-completed" class="text-2xl font-black mt-0.5 text-emerald-600">0</div>
                    </div>
                    <div class="p-2 bg-emerald-50 rounded-lg text-emerald-600"><i data-lucide="check-circle-2" class="h-4 w-4"></i></div>
                </div>
            </div>

            <!-- Filtering & Searching System Row -->
            <div class="flex flex-col sm:flex-row gap-4 sm:items-center sm:justify-between border-b border-border pb-4">
                <div class="inline-flex h-10 items-center justify-center rounded-md bg-gray-200 p-1 text-gray-900 max-w-max">
                    <button onclick="setTab('All')" id="tab-All" class="inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-bold transition-all bg-white text-foreground shadow-sm">
                        All
                    </button>
                    <button onclick="setTab('Planned')" id="tab-Planned" class="inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-bold transition-all hover:bg-white/50">
                        Planned
                    </button>
                    <button onclick="setTab('In Progress')" id="tab-In Progress" class="inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-bold transition-all hover:bg-white/50">
                        In Progress
                    </button>
                    <button onclick="setTab('Completed')" id="tab-Completed" class="inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-bold transition-all hover:bg-white/50">
                        Completed
                    </button>
                </div>

                <div class="relative w-full sm:max-w-xs">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-gray-900"></i>
                    <input id="search" oninput="render()" placeholder="Search project titles or tags..." class="flex h-10 w-full rounded-md border-2 border-gray-300 bg-background pl-9 pr-3 py-2 text-sm font-semibold text-gray-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary">
                </div>
            </div>

            <!-- Dynamic Project Grid Rendering Workspace -->
            <div id="list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('ph') || '[]');
        let currentTab = 'All';

        const save = () => {
            localStorage.setItem('ph', JSON.stringify(data));
            updateStats();
        };

        // Context-aware automatic project description generator engine
        function autoGenerateDescription() {
            const titleInput = document.getElementById('t').value.trim();
            if (!titleInput) {
                alert('Please type a Project Title first so the AI can tailor a description details layout for you!');
                return;
            }

            const lowerTitle = titleInput.toLowerCase();
            let autoDesc = "";

            if (lowerTitle.includes('shop') || lowerTitle.includes('commerce') || lowerTitle.includes('store')) {
                autoDesc = `A secure, state-of-the-art e-commerce framework featuring responsive global cart synchronization, dynamic product database filtering updates, and optimized multi-tiered checkouts.`;
            } else if (lowerTitle.includes('chat') || lowerTitle.includes('social') || lowerTitle.includes('messaging')) {
                autoDesc = `A highly concurrent communication application utilizing bi-directional real-time data streaming sockets, custom user profiles tracking, and cloud asset message distribution layers.`;
            } else if (lowerTitle.includes('portfolio') || lowerTitle.includes('cv') || lowerTitle.includes('resume')) {
                autoDesc = `A streamlined, fast-loading aesthetic developer presentation space meticulously structured to highlight production code repos, active tracking stats, and deployment logs cleanly.`;
            } else if (lowerTitle.includes('task') || lowerTitle.includes('manage') || lowerTitle.includes('todo') || lowerTitle.includes('hub')) {
                autoDesc = `A robust contextual workflow utility manager engineered with secure granular identity tracking, state filtering layers, and persistent caching logic for rapid productivity execution.`;
            } else if (lowerTitle.includes('dashboard') || lowerTitle.includes('crypto') || lowerTitle.includes('finance') || lowerTitle.includes('tracker')) {
                autoDesc = `An analytical data platform featuring responsive visualization layouts, complex performance metrics calculations, and secure API resource aggregation pipelines.`;
            } else {
                // Highly generic but professional fallback description structure
                autoDesc = `A modular, high-performance web platform designed with responsive component systems, robust layout states preservation, and comprehensive service-layer architecture configurations.`;
            }

            document.getElementById('d').value = autoDesc;
            saveDraft();
        }

        function saveDraft() {
            const draft = {
                t: document.getElementById('t').value,
                d: document.getElementById('d').value,
                tech: document.getElementById('tech').value,
                s: document.getElementById('s').value,
                demo: document.getElementById('demo').value,
                git: document.getElementById('git').value,
                host: document.getElementById('host').value,
                editId: document.getElementById('edit-id').value
            };
            localStorage.setItem('ph_draft', JSON.stringify(draft));
        }

        function loadDraft() {
            const raw = localStorage.getItem('ph_draft');
            if (!raw) return;
            try {
                const draft = JSON.parse(raw);
                document.getElementById('t').value = draft.t || '';
                document.getElementById('d').value = draft.d || '';
                document.getElementById('tech').value = draft.tech || '';
                document.getElementById('s').value = draft.s || 'Planned';
                document.getElementById('git').value = draft.git || '';
                document.getElementById('demo').value = draft.demo || '';
                document.getElementById('host').value = draft.host || '';
                
                if (draft.editId) {
                    toggleEditState(draft.editId);
                }
            } catch(e) { console.error("Draft loading aborted", e); }
        }

        function setTab(tabName) {
            currentTab = tabName;
            ['All', 'Planned', 'In Progress', 'Completed'].forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                if (tab === tabName) {
                    btn.className = "inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-bold transition-all bg-white text-foreground shadow-sm";
                } else {
                    btn.className = "inline-flex items-center justify-center whitespace-nowrap rounded-sm px-3 py-1.5 text-sm font-bold transition-all text-gray-900 hover:bg-white/50";
                }
            });
            render();
        }

        function updateStats() {
            document.getElementById('stat-all').innerText = data.length;
            document.getElementById('stat-planned').innerText = data.filter(p => p.s === 'Planned').length;
            document.getElementById('stat-progress').innerText = data.filter(p => p.s === 'In Progress').length;
            document.getElementById('stat-completed').innerText = data.filter(p => p.s === 'Completed').length;
        }

        function handleSubmit() {
            let t = document.getElementById('t').value.trim(); 
            if (!t) return alert('Title is required');
            
            let editId = document.getElementById('edit-id').value;

            const payload = {
                t,
                d: document.getElementById('d').value,
                tech: document.getElementById('tech').value,
                s: document.getElementById('s').value,
                git: document.getElementById('git').value,
                demo: document.getElementById('demo').value,
                host: document.getElementById('host').value
            };

            if (editId) {
                data = data.map(p => p.id == editId ? { ...p, ...payload } : p);
            } else {
                data.unshift({ id: Date.now(), ...payload });
            }

            clearForm();
            save(); 
            render();
        }

        function editProject(id) {
            const project = data.find(p => p.id == id);
            if (!project) return;

            document.getElementById('t').value = project.t;
            document.getElementById('d').value = project.d;
            document.getElementById('tech').value = project.tech;
            document.getElementById('s').value = project.s;
            document.getElementById('git').value = project.git || '';
            document.getElementById('demo').value = project.demo || '';
            document.getElementById('host').value = project.host || '';
            
            toggleEditState(id);
            saveDraft();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleEditState(id) {
            document.getElementById('edit-id').value = id;
            document.getElementById('submit-text').innerText = "Save Changes";
            document.getElementById('submit-btn').className = "inline-flex items-center justify-center rounded-md text-sm font-bold transition-colors bg-amber-600 text-white hover:bg-amber-700 h-11 py-2 px-4 w-full shadow";
            document.getElementById('cancel-btn').style.display = "inline-flex";
            document.getElementById('sidebar-container').classList.add('bg-amber-50/30');
            document.getElementById('submit-icon').setAttribute('data-lucide', 'save');
            lucide.createIcons();
        }

        function clearForm() {
            document.getElementById('edit-id').value = '';
            ['t', 'd', 'tech', 'git', 'demo', 'host'].forEach(i => document.getElementById(i).value = ''); 
            document.getElementById('s').selectedIndex = 0; 
            
            document.getElementById('submit-text').innerText = "Add Project";
            document.getElementById('submit-btn').className = "inline-flex items-center justify-center rounded-md text-sm font-bold transition-colors bg-gray-900 text-white hover:bg-gray-800 h-11 py-2 px-4 w-full shadow";
            document.getElementById('cancel-btn').style.display = "none";
            document.getElementById('sidebar-container').classList.remove('bg-amber-50/30');
            document.getElementById('submit-icon').setAttribute('data-lucide', 'plus');
            
            localStorage.removeItem('ph_draft');
            lucide.createIcons();
        }

        function del(id) { 
            if (confirm('Are you sure you want to delete this project permanently?')) { 
                data = data.filter(p => p.id !== id);
                if(document.getElementById('edit-id').value == id) {
                    clearForm();
                }
                save(); 
                render(); 
            } 
        }

        function render() {
            let q = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('list');
            list.innerHTML = '';

            data.forEach((p) => {
                if (currentTab !== 'All' && p.s !== currentTab) return;
                if (!(p.t.toLowerCase().includes(q) || p.tech.toLowerCase().includes(q))) return;

                let statusBadgeColor = "bg-amber-100 text-amber-900 border border-amber-300";
                if (p.s === 'In Progress') statusBadgeColor = "bg-blue-100 text-blue-900 border border-blue-300";
                if (p.s === 'Completed') statusBadgeColor = "bg-emerald-100 text-emerald-900 border border-emerald-300";

                let tagHTML = '';
                if (p.tech && p.tech.trim()) {
                    tagHTML = p.tech.split(',').map(tech => 
                        `<span class="inline-flex items-center rounded-md bg-gray-100 border border-gray-300 px-2.5 py-0.5 text-xs font-bold text-gray-900">${tech.trim()}</span>`
                    ).join(' ');
                }

                list.innerHTML += `
                    <div class="rounded-xl border border-border bg-white text-card-foreground shadow-sm flex flex-col justify-between transition-all hover:shadow-md">
                        <div class="p-6 space-y-3">
                            <div class="flex items-start justify-between gap-2">
                                <h3 class="font-bold leading-none tracking-tight text-lg text-gray-900">${p.t}</h3>
                                <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-bold ${statusBadgeColor}">${p.s}</span>
                            </div>
                            <p class="text-sm font-medium text-gray-800 line-clamp-3">${p.d || '<span class="italic opacity-50">No description provided.</span>'}</p>
                            <div class="flex flex-wrap gap-1.5 pt-1">${tagHTML}</div>
                        </div>
                        <div class="flex flex-col p-4 border-t border-border mt-auto gap-2 bg-slate-50/50 rounded-b-xl">
                            <!-- Link Row Action Bars -->
                            <div class="flex items-center gap-1.5 w-full">
                                ${p.demo ? `<a class="inline-flex items-center justify-center rounded-md text-xs font-bold transition-colors bg-gray-900 text-white hover:bg-gray-800 h-9 px-3 flex-1" href="${p.demo}" target="_blank"><i data-lucide="external-link" class="w-3.5 h-3.5 mr-1.5"></i>Demo</a>` : ''}
                                ${p.git ? `<a class="inline-flex items-center justify-center rounded-md text-xs font-bold transition-colors border-2 border-gray-300 bg-background hover:bg-accent text-gray-900 h-9 px-3 flex-1" href="${p.git}" target="_blank"><i data-lucide="github" class="w-3.5 h-3.5 mr-1.5"></i>GitHub</a>` : ''}
                            </div>
                            
                            <!-- Secondary Hosted/Utility Management Row -->
                            <div class="flex items-center justify-between gap-1 w-full pt-1 border-t border-gray-200/60">
                                ${p.host ? `
                                    <a class="inline-flex items-center text-xs font-bold text-blue-700 hover:underline px-1 py-1" href="${p.host}" target="_blank">
                                        <i data-lucide="server" class="w-3.5 h-3.5 mr-1"></i> Hosted Link
                                    </a>
                                ` : '<span class="text-[11px] font-medium text-gray-400 italic pl-1">No host link</span>'}
                                
                                <div class="flex items-center gap-1">
                                    <button class="inline-flex items-center justify-center rounded-md text-xs font-medium transition-colors hover:bg-gray-200 h-8 w-8 text-gray-800" onclick="editProject(${p.id})" title="Edit Project">
                                        <i data-lucide="pencil" class="w-4 h-4"></i>
                                    </button>
                                    <button class="inline-flex items-center justify-center rounded-md text-xs font-medium transition-colors hover:bg-red-100 hover:text-red-700 h-8 w-8 text-gray-800" onclick="del(${p.id})" title="Delete Project">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            if (!list.innerHTML) {
                list.innerHTML = `
                    <div class="col-span-full border border-dashed border-gray-300 rounded-xl p-12 text-center">
                        <i data-lucide="folder-open" class="mx-auto h-8 w-8 text-gray-400 mb-3"></i>
                        <p class="font-bold text-gray-900">No projects found</p>
                        <p class="text-xs font-semibold text-gray-600 mt-0.5">Change filters or add a new blueprint to get started.</p>
                    </div>`;
            }
            lucide.createIcons();
        }

        // Bootstrapping Engine
        updateStats();
        render();
        loadDraft();
    </script>
</body>

</html>
